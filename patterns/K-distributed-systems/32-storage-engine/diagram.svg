<tspan x="575" dy="0">SSTable_1 (舊) + index + bloom</tspan>
</text>
<text x="40" y="300" font-size="16" fill="#2f9e44" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">▼ 讀路徑</tspan>
</text>
<rect x="40" y="332" width="150" height="60" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="115" y="352" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="115" dy="0">get(key)</tspan>
</text>
<rect x="250" y="332" width="150" height="60" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="325" y="344" font-size="13" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="325" dy="0">bloom 過濾</tspan>
<tspan x="325" dy="16.25">false→跳過 IO</tspan>
</text>
<text x="250" y="296" font-size="13" fill="#2f9e44" text-anchor="start" dominant-baseline="hanging">
<tspan x="250" dy="0">先查 memtable，未命中→</tspan>
</text>
<text x="760" y="300" font-size="16" fill="#e8590c" text-anchor="start" dominant-baseline="hanging">
<tspan x="760" dy="0">● compaction</tspan>
</text>
<rect x="760" y="332" width="200" height="88" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="860" y="346" font-size="13" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="860" dy="0">合併後 SSTable</tspan>
<tspan x="860" dy="16.25">丟棄被覆寫/tombstone</tspan>
<tspan x="860" dy="16.25">更少更大→降讀放大</tspan>
</text>
