<tspan x="325" dy="0">① WAL</tspan>
<tspan x="325" dy="17.5">順序寫·崩潰復原</tspan>
</text>
<rect x="460" y="110" width="160" height="60" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
