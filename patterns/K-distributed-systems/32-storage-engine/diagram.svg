<tspan x="540" dy="0">② memtable</tspan>
<tspan x="540" dy="17.5">記憶體有序·tombstone</tspan>
</text>
<text x="470" y="196" font-size="13" fill="#1971c2" text-anchor="start" dominant-baseline="hanging">
<tspan x="470" dy="0">③ 滿門檻 → flush</tspan>
</text>
<rect x="460" y="230" width="230" height="50" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="575" y="244" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="575" dy="0">SSTable_n (新) + index + bloom</tspan>
</text>
<rect x="460" y="300" width="230" height="50" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="575" y="314" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
