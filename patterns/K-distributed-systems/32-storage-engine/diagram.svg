<rect x="16" y="0" width="968" height="444" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">LSM-tree 儲存引擎 — 寫路徑=藍 讀路徑=綠 背景/基建=黃</tspan>
</text>
<text x="40" y="78" font-size="16" fill="#1971c2" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">▶ 寫路徑</tspan>
</text>
