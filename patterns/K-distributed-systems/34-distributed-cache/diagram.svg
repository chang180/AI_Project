<marker id="ah760da0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1971c2"/></marker>
<marker id="ah60a55d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e8590c"/></marker>
</defs>
<rect x="16" y="0" width="748" height="554" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">分散式快取 (Redis Cluster) — 高階架構（寫=藍 讀=綠 基建=黃）</tspan>
</text>
<rect x="40" y="90" width="170" height="64" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="125" y="110" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="125" dy="0">Client (讀/寫)</tspan>
</text>
<rect x="270" y="84" width="220" height="76" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="380" y="98" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="380" dy="0">slot 路由</tspan>
<tspan x="380" dy="18.75">slot = CRC16(key) % 16384</tspan>
</text>
<rect x="560" y="60" width="180" height="88" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="650" y="74" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">shardA</tspan>
<tspan x="650" dy="18.75">slots 0–5460</tspan>
<tspan x="650" dy="18.75">master + replica</tspan>
</text>
<rect x="560" y="168" width="180" height="88" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="650" y="182" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">shardB</tspan>
<tspan x="650" dy="18.75">slots 5461–10921</tspan>
<tspan x="650" dy="18.75">master + replica</tspan>
</text>
<rect x="560" y="276" width="180" height="88" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="650" y="290" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">shardC</tspan>
<tspan x="650" dy="18.75">slots 10922–16383</tspan>
<tspan x="650" dy="18.75">master + replica</tspan>
</text>
<rect x="560" y="392" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="650" y="406" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">maxmemory 滿</tspan>
<tspan x="650" dy="17.5">淘汰：LRU / LFU</tspan>
</text>
<rect x="270" y="280" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="360" y="300" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="360" dy="0">DB (回源)</tspan>
</text>
<rect x="40" y="420" width="470" height="110" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="54" y="432" font-size="14" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="54" dy="0">三大快取問題 + 緩解</tspan>
<tspan x="54" dy="17.5">穿透：查不存在 → 空值快取 / 布隆過濾器擋</tspan>
<tspan x="54" dy="17.5">擊穿：熱 key 過期併發回源 → singleflight 互斥鎖</tspan>
<tspan x="54" dy="17.5">雪崩：大量 key 同時過期 → TTL 加隨機抖動</tspan>
</text>
