<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="16 0 908 509" width="908" height="509" font-family="system-ui,'Segoe UI','Microsoft JhengHei',sans-serif">
<defs>
<marker id="ah760da0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1971c2"/></marker>
<marker id="ah78c166" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2f9e44"/></marker>
</defs>
<rect x="16" y="0" width="908" height="509" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">分散式交易 — 兩階段提交 2PC（協調者=藍 參與者=綠 基建=黃）</tspan>
</text>
<rect x="40" y="130" width="150" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="115" y="150" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="115" dy="0">Client 轉帳</tspan>
</text>
<rect x="300" y="120" width="200" height="84" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="400" y="138" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="400" dy="0">Coordinator (TM)</tspan>
<tspan x="400" dy="20">決議日誌 (WAL)</tspan>
</text>
<rect x="220" y="340" width="200" height="90" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="320" y="356" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="320" dy="0">參與者 A (分片)</tspan>
<tspan x="320" dy="20">alice -200</tspan>
<tspan x="320" dy="20">prepare→WAL+鎖</tspan>
</text>
<rect x="520" y="340" width="200" height="90" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="620" y="356" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="620" dy="0">參與者 B (分片)</tspan>
<tspan x="620" dy="20">bob +200</tspan>
<tspan x="620" dy="20">prepare→WAL+鎖</tspan>
</text>
<text x="540" y="150" font-size="16" fill="#e8590c" text-anchor="start" dominant-baseline="hanging">
<tspan x="540" dy="0">① prepare：能不能提交? → 收集投票</tspan>
</text>
<text x="540" y="185" font-size="16" fill="#e8590c" text-anchor="start" dominant-baseline="hanging">
<tspan x="540" dy="0">② 全 YES→commit／任一 NO→abort 回滾</tspan>
</text>
<text x="220" y="460" font-size="16" fill="#862e9c" text-anchor="start" dominant-baseline="hanging">
<tspan x="220" dy="0">原子性：兩分片要嘛都 commit、要嘛都 abort（總額守恆）</tspan>
</text>
<polyline points="192,162 296,162" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#ah760da0)" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="360,206 320,336" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#ah78c166)" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="440,206 620,336" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#ah78c166)" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
