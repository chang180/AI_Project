<rect x="16" y="0" width="898" height="404" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">日誌聚合 Log Aggregation（ELK）</tspan>
</text>
<rect x="40" y="110" width="150" height="80" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="115" y="138" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="115" dy="0">應用伺服器</tspan>
<tspan x="115" dy="20">(數百台)</tspan>
</text>
<rect x="240" y="110" width="150" height="80" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="315" y="138" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="315" dy="0">收集 Agent</tspan>
<tspan x="315" dy="20">(Filebeat)</tspan>
</text>
<rect x="440" y="110" width="150" height="80" rx="8" fill="#ffd8a8" stroke="#e8590c" stroke-width="2"/>
<text x="515" y="138" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="515" dy="0">緩衝佇列</tspan>
<tspan x="515" dy="20">(Kafka)</tspan>
</text>
<rect x="640" y="110" width="150" height="80" rx="8" fill="#eebefa" stroke="#9c36b5" stroke-width="2"/>
<text x="715" y="138" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="715" dy="0">處理/解析</tspan>
<tspan x="715" dy="20">(Logstash)</tspan>
</text>
<rect x="440" y="280" width="200" height="100" rx="8" fill="#fcc2d7" stroke="#c2255c" stroke-width="2"/>
<text x="540" y="308" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="540" dy="0">索引/儲存</tspan>
<tspan x="540" dy="20">(Elasticsearch)</tspan>
