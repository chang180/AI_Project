<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="16 0 868 454" width="868" height="454" font-family="system-ui,'Segoe UI','Microsoft JhengHei',sans-serif">
<defs>
<marker id="ah760da0" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1971c2"/></marker>
<marker id="ah78c166" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2f9e44"/></marker>
</defs>
<rect x="16" y="0" width="868" height="454" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">OLAP / 列式儲存 — 資料倉儲管線（入庫=藍 列式儲存=黃 查詢=綠）</tspan>
</text>
<rect x="40" y="100" width="170" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="125" y="112" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="125" dy="0">OLTP 來源</tspan>
<tspan x="125" dy="18.75">(行式交易庫)</tspan>
</text>
<rect x="280" y="100" width="170" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="365" y="112" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="365" dy="0">ETL / CDC</tspan>
<tspan x="365" dy="18.75">(行轉列入庫)</tspan>
</text>
<rect x="520" y="90" width="300" height="200" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="670" y="100" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="670" dy="0">列式儲存（每欄一連續陣列）</tspan>
</text>
<rect x="540" y="135" width="260" height="30" rx="8" fill="#ffffff" stroke="#e8590c" stroke-width="1"/>
<text x="550" y="142" font-size="13" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="550" dy="0">ts:     [t0,t1,t2,...]  delta</tspan>
</text>
<rect x="540" y="170" width="260" height="30" rx="8" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1"/>
<text x="550" y="177" font-size="13" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="550" dy="0">region: [r0,r1,...]  dict  ← 用到</tspan>
</text>
<rect x="540" y="205" width="260" height="30" rx="8" fill="#ffffff" stroke="#e8590c" stroke-width="1"/>
<text x="550" y="212" font-size="13" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="550" dy="0">device: [d0,d1,...]  dict  (略過)</tspan>
</text>
<rect x="540" y="240" width="260" height="30" rx="8" fill="#d3f9d8" stroke="#2f9e44" stroke-width="1"/>
<text x="550" y="247" font-size="13" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="550" dy="0">amount: [a0,a1,...]      ← 用到</tspan>
</text>
<rect x="280" y="360" width="220" height="70" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="390" y="372" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="390" dy="0">向量化查詢引擎</tspan>
<tspan x="390" dy="17.5">SUM(amount) GROUP BY region</tspan>
</text>
<rect x="40" y="360" width="170" height="70" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="125" y="380" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="125" dy="0">BI / 報表</tspan>
<tspan x="125" dy="17.5">(聚合結果)</tspan>
</text>
<text x="540" y="360" font-size="13" fill="#e03131" text-anchor="start" dominant-baseline="hanging">
<tspan x="540" dy="0">核心：查詢只掃 region+amount 兩欄；</tspan>
<tspan x="540" dy="16.25">行式得讀整列 4 欄 → 多掃 2×。</tspan>
<tspan x="540" dy="16.25">欄壓縮(dict/RLE/delta)+min/max 跳塊</tspan>
<tspan x="540" dy="16.25">+ MPP 平行再加速。</tspan>
</text>
