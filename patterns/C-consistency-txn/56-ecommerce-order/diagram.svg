<tspan x="650" dy="18.75">A 原子預扣</tspan>
</text>
<rect x="560" y="230" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="650" y="242" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">支付服務</tspan>
<tspan x="650" dy="18.75">B 扣款</tspan>
</text>
<rect x="560" y="350" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="650" y="362" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="650" dy="0">出貨服務</tspan>
<tspan x="650" dy="18.75">C 確認 → SHIPPED</tspan>
</text>
<rect x="260" y="350" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="350" y="362" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="350" dy="0">訊息佇列</tspan>
<tspan x="350" dy="18.75">(非同步事件)</tspan>
</text>
<text x="560" y="470" font-size="14" fill="#c92a2a" text-anchor="start" dominant-baseline="hanging">
<tspan x="560" dy="0">任一步失敗 → 反向補償(紅)：</tspan>
<tspan x="560" dy="17.5">退款 + 釋放庫存 → 訂單 CANCELLED</tspan>
</text>
