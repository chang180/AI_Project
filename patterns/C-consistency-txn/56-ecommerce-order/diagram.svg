<rect x="16" y="0" width="888" height="544" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">電商下單系統 — Saga 編排（正向=藍 補償=紅 基建=黃）</tspan>
</text>
<rect x="40" y="110" width="150" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="115" y="130" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="115" dy="0">Client 下單</tspan>
</text>
<rect x="260" y="110" width="180" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="350" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="350" dy="0">訂單服務</tspan>
<tspan x="350" dy="18.75">(狀態機+冪等)</tspan>
</text>
<rect x="260" y="230" width="180" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="350" y="242" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="350" dy="0">Saga 編排器</tspan>
<tspan x="350" dy="18.75">(動作+補償)</tspan>
</text>
<rect x="560" y="110" width="180" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="650" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
