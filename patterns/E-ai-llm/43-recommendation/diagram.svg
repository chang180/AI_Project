<tspan x="595" dy="18.75">多特徵打分</tspan>
<tspan x="595" dy="18.75">(相似度/熱門/新鮮)</tspan>
<tspan x="595" dy="18.75">→ 精排</tspan>
</text>
<rect x="750" y="330" width="150" height="64" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="825" y="352" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="825" dy="0">Top-N 推薦清單</tspan>
</text>
<rect x="250" y="460" width="190" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="345" y="472" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="345" dy="0">冷啟動 fallback</tspan>
<tspan x="345" dy="18.75">熱門 item (popularity)</tspan>
</text>
