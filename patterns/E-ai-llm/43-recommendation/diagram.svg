<rect x="16" y="0" width="908" height="548" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">推薦系統 — 兩階段：召回→排序（主流程=藍 回應=綠 基建=黃）</tspan>
</text>
<text x="40" y="80" font-size="16" fill="#e8590c" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">── 離線（批次訓練 / 算特徵）──</tspan>
</text>
<rect x="40" y="110" width="160" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="120" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="120" dy="0">user 互動事件</tspan>
<tspan x="120" dy="18.75">(曝光/點擊/購買)</tspan>
</text>
<rect x="260" y="110" width="170" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="345" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="345" dy="0">離線訓練</tspan>
<tspan x="345" dy="18.75">item-item 相似度</tspan>
<tspan x="345" dy="18.75">+ embedding</tspan>
</text>
<rect x="490" y="110" width="170" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="575" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="575" dy="0">特徵存儲</tspan>
<tspan x="575" dy="18.75">Feature Store</tspan>
<tspan x="575" dy="18.75">(相似度/向量/特徵)</tspan>
</text>
<rect x="490" y="200" width="170" height="56" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="575" y="214" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="575" dy="0">ANN 索引 (HNSW/IVF)</tspan>
</text>
<text x="40" y="300" font-size="16" fill="#2f9e44" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">── 線上（一次推薦請求）──</tspan>
</text>
<rect x="40" y="330" width="150" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="115" y="352" font-size="16" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="115" dy="0">推薦請求 (user)</tspan>
</text>
<rect x="250" y="320" width="190" height="84" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="345" y="332" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="345" dy="0">① 召回 Recall</tspan>
<tspan x="345" dy="18.75">協同過濾 (CF)</tspan>
<tspan x="345" dy="18.75">+ Embedding ANN</tspan>
<tspan x="345" dy="18.75">→ 數百候選</tspan>
</text>
<rect x="500" y="320" width="190" height="84" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="595" y="332" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
