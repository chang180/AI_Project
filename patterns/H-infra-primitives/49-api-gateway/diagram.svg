<polyline points="555,360 555,286" fill="none" stroke="#e8590c" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#ah60a55d)" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="652,210 736,100" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#ah78c166)" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="652,232 736,230" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#ah78c166)" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="652,256 736,360" fill="none" stroke="#ff7b72" stroke-width="2" stroke-dasharray="2 6" marker-end="url(#ah9d6d30)" stroke-linecap="round" stroke-linejoin="round"/>
<text x="656" y="300" font-size="12" fill="#ff7b72" text-anchor="start" dominant-baseline="hanging">
<tspan x="656" dy="0">熔斷:不導流</tspan>
</text>
<text x="40" y="470" font-size="14" fill="#495057" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">請求路徑：Client → L4 LB(挑一台 GW) → API Gateway(L7：認證/路由/限流/LB/健康/熔斷) → 對應服務池內挑一台健康後端。控制面(黃,虛線)維護路由表與健康狀態；熔斷打開的後端(紅,點線)被繞過。</tspan>
</text>
