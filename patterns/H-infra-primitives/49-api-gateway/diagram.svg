<text x="325" y="213" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="325" dy="0">L4 LB</tspan>
<tspan x="325" dy="17.5">(分流到 GW)</tspan>
</text>
<rect x="460" y="180" width="190" height="104" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="555" y="196" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="555" dy="0">API Gateway (L7)</tspan>
<tspan x="555" dy="17.5">認證·路由·限流</tspan>
<tspan x="555" dy="17.5">·LB·健康·熔斷</tspan>
</text>
<rect x="460" y="40" width="190" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="555" y="53" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="555" dy="0">控制面：路由表 /</tspan>
<tspan x="555" dy="17.5">後端池 / 健康狀態</tspan>
</text>
