<tspan x="355" dy="0">Worker w1 ✓</tspan>
</text>
<rect x="430" y="296" width="110" height="50" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
<text x="485" y="310" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="485" dy="0">Worker w2 ✗</tspan>
</text>
<rect x="560" y="296" width="130" height="50" rx="8" fill="#b2f2bb" stroke="#2f9e44" stroke-width="2"/>
