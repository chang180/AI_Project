<rect x="16" y="0" width="738" height="494" fill="#ffffff"/>
<text x="40" y="24" font-size="22" fill="#1e1e1e" text-anchor="start" dominant-baseline="hanging">
<tspan x="40" dy="0">分散式排程器 / Cron — 高階架構（主流程=藍 回應=綠 基建=黃）</tspan>
</text>
<rect x="40" y="110" width="160" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="120" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="120" dy="0">排程定義</tspan>
<tspan x="120" dy="18.75">(interval/cron)</tspan>
</text>
<rect x="280" y="110" width="170" height="64" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="365" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="365" dy="0">Job Store (DB)</tspan>
<tspan x="365" dy="18.75">index: next_run</tspan>
</text>
<rect x="530" y="110" width="180" height="64" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="620" y="122" font-size="15" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="620" dy="0">Scheduler</tspan>
<tspan x="620" dy="18.75">掃描到點→產生 fire</tspan>
</text>
<rect x="530" y="24" width="180" height="54" rx="8" fill="#ffec99" stroke="#e8590c" stroke-width="2"/>
<text x="620" y="32" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="620" dy="0">Leader 選舉</tspan>
<tspan x="620" dy="17.5">(etcd/ZK 協調)</tspan>
<tspan x="620" dy="17.5">避免重複掃描</tspan>
</text>
<rect x="280" y="250" width="430" height="110" rx="8" fill="#d3f9d8" stroke="#2f9e44" stroke-width="2"/>
