<tspan x="380" dy="0">鎖 + fencing token + 租約</tspan>
<tspan x="380" dy="17.5">只一個成功 → 執行</tspan>
</text>
<rect x="530" y="410" width="200" height="60" rx="8" fill="#a5d8ff" stroke="#1971c2" stroke-width="2"/>
<text x="630" y="420" font-size="14" fill="#1e1e1e" text-anchor="middle" dominant-baseline="hanging">
<tspan x="630" dy="0">worker 當掉 / 租約過期</tspan>
<tspan x="630" dy="17.5">→ misfire 補跑 + 接管</tspan>
</text>
